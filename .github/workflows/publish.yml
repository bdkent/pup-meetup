name: Publish

# Build the static site and deploy it to GitHub Pages. The paid API ingest
# (Apify Instagram + Claude vision) runs ONLY on the schedule and on manual
# dispatch — a plain push to main just rebuilds and redeploys the site from the
# already-ingested data (no API calls, no cost). So code/content/new-org pushes
# ship immediately for free; their events get pulled on the next scheduled run or
# a manual dispatch. This is the "provider-in-Actions" variant of the architecture
# (brief §4 / open decision #2): all stages run in CI; no off-GitHub box, because
# the scraping provider supplies the residential IP.

on:
  schedule:
    - cron: "0 11 */3 * *" # every ~3 days at 11:00 UTC (Apify cost control)
  workflow_dispatch:
    inputs:
      max_posts:
        description: "Instagram posts to fetch per account (one-off backfill; steady-state is 5)"
        default: "5"
        required: false
  push:
    branches: [main]

permissions:
  contents: write # push the durable store to the `data` branch
  pages: write
  id-token: write

# Never run two deploys at once; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can push the data branch
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Restore the durable store (raw posts, cursors, geocache) from the data branch.
      - name: Restore data store
        run: bash scripts/restore-data.sh

      # Full ingest (the PAID step: Apify + Claude). Schedule + manual dispatch
      # ONLY — never on a push, so committing never costs money.
      - name: Ingest feeds + build site
        if: github.event_name != 'push'
        env:
          # Optional: set this repo secret to enable Instagram ingestion.
          # If unset, instagram sources are skipped and the free feeds still run.
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # Enables the vision flyer extractor (reads event date/venue off the
          # image). If unset, image posts are skipped (the caption isn't trusted).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Hard monthly cap on vision calls — the budget guardrail (default 100).
          VISION_MAX_CALLS_PER_MONTH: "100"
          # Posts fetched per IG account. 5 for scheduled runs; a manual backfill
          # (workflow_dispatch) can raise it to pull older posts. The vision cap
          # above still bounds spend regardless of this value.
          IG_MAX_POSTS: ${{ inputs.max_posts || '5' }}
        run: npm run build

      # A plain push just rebuilds the site from the restored store — NO ingest,
      # NO API calls, NO cost. New orgs and site/copy changes go live right away;
      # their events are pulled on the next scheduled run (or a manual dispatch).
      - name: Build site only (free; push deploys)
        if: github.event_name == 'push'
        run: npm run build:site

      # Persist the durable store back to the data branch (as github-actions[bot]).
      # Only after an ingest — a push-only run produces no new data to persist.
      - name: Persist data store
        if: github.event_name != 'push'
        run: bash scripts/persist-data.sh

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deploy
        uses: actions/deploy-pages@v4
