name: Publish

# Ingest the free feeds (+ Instagram if APIFY_TOKEN is set), build the static
# site, and deploy it to GitHub Pages. Runs daily, on every push to main, and
# on demand. This is the "provider-in-Actions" variant of the architecture
# (brief §4 / open decision #2): all stages run in CI; no off-GitHub box, because
# the scraping provider supplies the residential IP.

on:
  schedule:
    - cron: "0 11 * * *" # daily ~11:00 UTC
  workflow_dispatch:
    inputs:
      max_posts:
        description: "Instagram posts to fetch per account (one-off backfill; steady-state is 5)"
        default: "5"
        required: false
  push:
    branches: [main]

permissions:
  contents: write # push the durable store to the `data` branch
  pages: write
  id-token: write

# Never run two deploys at once; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can push the data branch
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Restore the durable store (raw posts, cursors, geocache) from the data branch.
      - name: Restore data store
        run: bash scripts/restore-data.sh

      - name: Ingest feeds + build site
        env:
          # Optional: set this repo secret to enable Instagram ingestion.
          # If unset, instagram sources are skipped and the free feeds still run.
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          # Enables the vision flyer extractor (reads event date/venue off the
          # image). If unset, image posts are skipped (the caption isn't trusted).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Hard monthly cap on vision calls — the budget guardrail (default 100).
          VISION_MAX_CALLS_PER_MONTH: "100"
          # Posts fetched per IG account. 5 for scheduled/push runs; a manual
          # backfill (workflow_dispatch) can raise it to pull older posts. The
          # vision cap above still bounds spend regardless of this value.
          IG_MAX_POSTS: ${{ inputs.max_posts || '5' }}
        run: npm run build

      # Persist the durable store back to the data branch (as github-actions[bot]).
      - name: Persist data store
        run: bash scripts/persist-data.sh

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deploy
        uses: actions/deploy-pages@v4
